<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luanet API | Script Hosting</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        body { background-color: #020617; color: #cbd5e1; font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; margin: 0; overflow-x: hidden; }
        #root { min-height: 100vh; width: 100%; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(99, 102, 241, 0.1); border-left-color: #6366f1; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(51, 65, 85, 0.5); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
        const e = React.createElement;
        const { useState, useEffect } = React;

        function App() {
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('loadstrings');
            const [scripts, setScripts] = useState([]);
            const [copiedId, setCopiedId] = useState(null);
            const [showModal, setShowModal] = useState(false);
            const [modalContent, setModalContent] = useState("");

            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [user, activeTab, scripts, showModal]);

            const handleLogin = () => {
                setUser({ name: "Luanet Dev", provider: "Guest" });
            };

            const showAlert = (msg) => {
                setModalContent(msg);
                setShowModal(true);
            };

            if (!user) {
                return e('div', { className: "min-h-screen flex flex-col justify-center py-12 px-6 bg-[#020617]" }, 
                    e('div', { className: "sm:mx-auto sm:w-full sm:max-w-md text-center" },
                        e('div', { className: "bg-indigo-500/10 w-20 h-20 rounded-3xl flex items-center justify-center mx-auto mb-6 border border-indigo-500/20" },
                            e('i', { 'data-lucide': 'terminal', className: "text-indigo-500 w-10 h-10" })
                        ),
                        e('h2', { className: "text-4xl font-black text-white tracking-tight" }, "LUANET ", e('span', { className: "text-indigo-500" }, "API")),
                        e('p', { className: "mt-3 text-slate-400 font-medium italic" }, "Secure Script Distribution Layer")
                    ),
                    e('div', { className: "mt-10 sm:mx-auto sm:w-full sm:max-w-md" },
                        e('div', { className: "bg-slate-900/50 backdrop-blur-xl p-8 border border-slate-800 rounded-[2.5rem] space-y-4 shadow-2xl" },
                            e('button', { onClick: handleLogin, className: "w-full py-4 px-5 rounded-2xl text-sm font-black text-white bg-indigo-600 hover:bg-indigo-500 transition-all shadow-lg shadow-indigo-600/20" }, "LAUNCH DASHBOARD")
                        )
                    )
                );
            }

            return e('div', { className: "h-screen flex overflow-hidden bg-[#020617]" },
                // Sidebar
                e('div', { className: "w-72 bg-slate-900 border-r border-slate-800 flex flex-col z-20" },
                    e('div', { className: "h-24 flex items-center px-10 border-b border-slate-800/50" },
                        e('i', { 'data-lucide': 'terminal', className: "text-indigo-500 mr-3 w-6 h-6" }),
                        e('span', { className: "text-white font-black text-2xl tracking-tighter" }, "LUANET")
                    ),
                    e('div', { className: "p-6 flex-1 space-y-3" },
                        e(SidebarItem, { icon: 'link', label: 'Loadstrings', active: activeTab === 'loadstrings', onClick: () => setActiveTab('loadstrings') }),
                        e(SidebarItem, { icon: 'shield', label: 'Obfuscator', active: activeTab === 'obfuscator', onClick: () => setActiveTab('obfuscator') }),
                        e(SidebarItem, { icon: 'play', label: 'Tester', active: activeTab === 'simulator', onClick: () => setActiveTab('simulator') })
                    ),
                    e('div', { className: "p-8 border-t border-slate-800/50" },
                        e('button', { onClick: () => setUser(null), className: "w-full flex items-center px-4 py-3 text-xs font-black text-slate-500 hover:text-red-400 transition-all" },
                            e('i', { 'data-lucide': 'log-out', className: "w-4 h-4 mr-3" }), "SIGN OUT"
                        )
                    )
                ),
                // Main Content
                e('div', { className: "flex-1 flex flex-col min-w-0 bg-[#020617] relative" },
                    e('header', { className: "h-24 border-b border-slate-800/50 flex items-center justify-between px-12" },
                        e('h1', { className: "text-3xl font-black text-white capitalize italic" }, activeTab),
                        e('div', { className: "flex items-center space-x-3 text-[10px] font-black text-indigo-400 bg-indigo-500/5 px-4 py-2 rounded-full border border-indigo-500/20" },
                            e('span', { className: "w-2 h-2 rounded-full bg-indigo-500 animate-pulse" }),
                            e('span', null, "SYSTEM ONLINE")
                        )
                    ),
                    e('main', { className: "flex-1 overflow-y-auto p-12" },
                        activeTab === 'loadstrings' ? e(LoadstringsTab, { scripts, setScripts, copiedId, setCopiedId, showAlert }) : 
                        activeTab === 'obfuscator' ? e(ObfuscatorTab) : e(SimulatorTab, { scripts })
                    ),
                    showModal && e('div', { className: "fixed inset-0 z-50 flex items-center justify-center p-6 bg-black/80 backdrop-blur-sm" },
                        e('div', { className: "glass w-full max-w-md p-8 rounded-[2.5rem] text-center" },
                            e('i', { 'data-lucide': 'info', className: "mx-auto mb-4 text-indigo-500", size: 40 }),
                            e('h3', { className: "text-xl font-black text-white mb-2" }, "SYSTEM MESSAGE"),
                            e('p', { className: "text-slate-400 mb-6 font-medium" }, modalContent),
                            e('button', { onClick: () => setShowModal(false), className: "bg-indigo-600 text-white px-8 py-3 rounded-xl font-black text-xs tracking-widest" }, "DISMISS")
                        )
                    )
                )
            );
        }

        function SidebarItem({ icon, label, active, onClick }) {
            return e('button', {
                onClick: onClick,
                className: `w-full flex items-center px-5 py-4 rounded-2xl text-sm font-black transition-all ${
                    active ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-600/20' : 'text-slate-500 hover:bg-slate-800/50 hover:text-slate-200'
                }`
            }, e('i', { 'data-lucide': icon, className: `w-5 h-5 mr-4 ${active ? 'text-white' : 'text-indigo-500'}` }), label.toUpperCase());
        }

        function LoadstringsTab({ scripts, setScripts, copiedId, setCopiedId, showAlert }) {
            const [name, setName] = useState('');
            const [code, setCode] = useState('');

            const handleCreate = () => {
                if (!name || !code) return;
                const newId = Math.random().toString(36).substr(2, 9);
                setScripts([{ id: newId, name, code }, ...scripts]);
                setName(''); setCode('');
                showAlert("Endpoint provisioned in local buffer. Note: For permanent hosting, please enable 'Cloud Sync' (Firebase upgrade).");
            };

            const copy = (id) => {
                const text = `loadstring(game:HttpGet("https://datashe192.github.io/luanet/raw/${id}"))()`;
                navigator.clipboard.writeText(text);
                setCopiedId(id);
                setTimeout(() => setCopiedId(null), 2000);
            }

            return e('div', { className: "max-w-4xl space-y-10" },
                e('div', { className: "bg-slate-900/50 border border-slate-800 p-10 rounded-[2.5rem]" },
                    e('h2', { className: "text-xl font-black text-white mb-6 italic" }, "PROVISION ENDPOINT"),
                    e('div', { className: "space-y-4" },
                        e('input', { value: name, onChange: e => setName(e.target.value), placeholder: "SCRIPT_NAME", className: "w-full bg-slate-950 border border-slate-800 rounded-xl px-5 py-4 text-white font-bold outline-none focus:border-indigo-500" }),
                        e('textarea', { value: code, onChange: e => setCode(e.target.value), placeholder: "-- Paste source code...", rows: 6, className: "w-full bg-slate-950 border border-slate-800 rounded-xl px-5 py-4 text-emerald-400 font-mono text-sm outline-none focus:border-indigo-500" }),
                        e('button', { onClick: handleCreate, className: "bg-indigo-600 text-white px-8 py-4 rounded-xl font-black text-xs tracking-widest uppercase hover:bg-indigo-500 transition-all" }, "DEPLOY")
                    )
                ),
                e('div', { className: "grid gap-4" },
                    scripts.map(s => e('div', { key: s.id, className: "bg-slate-900 border border-slate-800 p-6 rounded-2xl flex items-center justify-between" },
                        e('div', null, e('p', { className: "text-white font-black italic" }, s.name.toUpperCase()), e('p', { className: "text-xs text-slate-500 font-mono" }, "ID: " + s.id)),
                        e('button', { onClick: () => copy(s.id), className: `px-6 py-3 rounded-xl border font-black text-xs transition-all ${copiedId === s.id ? 'border-emerald-500 text-emerald-400' : 'border-slate-700 text-slate-400'}` }, 
                            copiedId === s.id ? "COPIED" : "GET LINK")
                    ))
                )
            );
        }

        function ObfuscatorTab() { return e('div', { className: "text-slate-500 font-bold" }, "Obfuscator Engine v1.0 Ready. Insert code to begin."); }
        
        function SimulatorTab({ scripts }) {
            const [selected, setSelected] = useState('');
            const [log, setLog] = useState(null);

            const simulateRequest = (isBrowser) => {
                const script = scripts.find(s => s.id === selected);
                if (!script) return;

                if (isBrowser) {
                    setLog({
                        status: 403,
                        message: "API Cannot be shown in browser",
                        sub: "Access Denied: Browser User-Agent detected.",
                        ua: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) Browser/v1"
                    });
                } else {
                    setLog({
                        status: 200,
                        message: script.code,
                        sub: "Success: Request originated from Executor.",
                        ua: "Roblox/WinInet (RobloxExecutor)"
                    });
                }
            };

            return e('div', { className: "max-w-4xl space-y-8" },
                e('div', { className: "bg-slate-900/50 p-10 rounded-[2.5rem] border border-slate-800" },
                    e('h2', { className: "text-xl font-black text-white mb-6" }, "MIDDLEWARE TESTER"),
                    e('select', { 
                        value: selected, 
                        onChange: e => setSelected(e.target.value),
                        className: "w-full bg-slate-950 border border-slate-800 p-4 rounded-xl mb-6 text-white outline-none"
                    }, 
                        e('option', { value: "" }, "Select a script to test..."),
                        scripts.map(s => e('option', { key: s.id, value: s.id }, s.name))
                    ),
                    e('div', { className: "grid grid-cols-2 gap-4" },
                        e('button', { onClick: () => simulateRequest(true), className: "bg-slate-800 p-6 rounded-2xl border border-slate-700 font-bold text-xs" }, "Simulate Browser"),
                        e('button', { onClick: () => simulateRequest(false), className: "bg-indigo-600/20 p-6 rounded-2xl border border-indigo-500/30 font-bold text-xs text-indigo-400" }, "Simulate Executor")
                    )
                ),
                log && e('div', { className: "bg-slate-950 p-8 rounded-[2.5rem] border border-slate-800 font-mono text-xs" },
                    e('p', { className: "text-indigo-500 mb-2" }, "[SERVER TRACE]"),
                    e('p', { className: "text-slate-500 mb-4" }, "User-Agent: " + log.ua),
                    e('div', { className: `p-6 rounded-xl border ${log.status === 403 ? 'border-red-500/20 bg-red-500/5 text-red-400' : 'border-emerald-500/20 bg-emerald-500/5 text-emerald-400'}` },
                        e('p', { className: "font-black text-sm mb-1" }, log.message),
                        e('p', { className: "opacity-50" }, log.sub)
                    )
                )
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(e(App));
    </script>
</body>
</html>
