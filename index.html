<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luanet Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #111827; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen font-sans antialiased selection:bg-blue-500/30">

    <div id="auth-container" class="flex min-h-screen items-center justify-center p-4">
        <div class="bg-gray-900 border border-gray-800 p-8 rounded-2xl w-full max-w-md shadow-2xl relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-blue-500 to-indigo-600"></div>
            <h1 class="text-3xl font-extrabold tracking-tight mb-2 bg-gradient-to-r from-blue-400 to-indigo-400 bg-clip-text text-transparent">Luanet</h1>
            <p id="auth-subtitle" class="text-gray-400 text-sm mb-6">Log in to manage your active cloud environment.</p>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-gray-400 mb-1">Username</label>
                    <input type="text" id="auth-user" class="w-full bg-gray-950 border border-gray-800 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-blue-500 transition-colors">
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-gray-400 mb-1">Password</label>
                    <input type="password" id="auth-pass" class="w-full bg-gray-950 border border-gray-800 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-blue-500 transition-colors">
                </div>
                <button id="auth-primary-btn" onclick="handleAuth()" class="w-full bg-blue-600 hover:bg-blue-500 font-medium text-sm py-2.5 rounded-lg transition-colors cursor-pointer mt-2 shadow-lg shadow-blue-600/20">Log In</button>
                <div class="text-center mt-4">
                    <button id="auth-toggle" onclick="toggleAuthMode()" class="text-xs text-gray-400 hover:text-blue-400 transition-colors cursor-pointer">Don't have an account? Sign Up</button>
                </div>
            </div>
        </div>
    </div>

    <div id="dashboard-container" class="hidden flex min-h-screen">
        <aside class="w-64 bg-gray-900 border-r border-gray-800 flex flex-col shrink-0">
            <div class="p-6 border-b border-gray-800">
                <div class="flex items-center space-x-2">
                    <div class="w-3 h-3 rounded-full bg-emerald-500 animate-pulse"></div>
                    <span class="font-bold tracking-wide text-lg text-white">Luanet Core</span>
                </div>
                <p id="user-display" class="text-xs text-gray-400 mt-1 truncate"></p>
            </div>
            <nav class="flex-1 p-4 space-y-1">
                <button onclick="switchTab('lua-scripts')" class="w-full flex items-center space-x-3 bg-gray-800 text-white px-4 py-2.5 rounded-lg text-sm font-medium transition-colors cursor-pointer group">
                    <span class="text-blue-400 font-mono group-hover:scale-110 transition-transform">&lt;/&gt;</span>
                    <span>Lua Scripts</span>
                </button>
            </nav>
            <div class="p-4 border-t border-gray-800">
                <button onclick="logout()" class="w-full bg-gray-800 hover:bg-red-900/40 hover:text-red-300 text-gray-400 px-4 py-2 rounded-lg text-xs font-medium transition-colors cursor-pointer">Sign Out</button>
            </div>
        </aside>

        <main class="flex-1 bg-gray-950 flex flex-col h-screen overflow-hidden">
            <header class="h-16 border-b border-gray-800 flex items-center justify-between px-8 bg-gray-900/40 backdrop-blur-md shrink-0">
                <h2 id="view-title" class="text-lg font-semibold text-white">Lua Scripts Dashboard</h2>
                <div id="view-actions">
                    <button id="create-btn" onclick="openScriptEditor()" class="bg-blue-600 hover:bg-blue-500 text-white text-xs font-medium px-4 py-2 rounded-lg transition-colors cursor-pointer shadow-md">Create Lua Script</button>
                </div>
            </header>

            <div class="flex-1 p-8 overflow-y-auto custom-scrollbar">
                <div id="tab-lua-scripts" class="block">
                    <div id="scripts-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
                    <div id="empty-state" class="hidden text-center py-12 border border-dashed border-gray-800 rounded-xl">
                        <p class="text-gray-500 text-sm">No scripts compiled yet.</p>
                    </div>
                </div>

                <div id="tab-editor" class="hidden h-full flex flex-col space-y-4">
                    <div class="flex gap-4">
                        <input type="text" id="script-title" placeholder="Script Name" class="flex-1 bg-gray-900 border border-gray-800 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-blue-500 transition-colors">
                        <button onclick="switchTab('lua-scripts')" class="bg-gray-800 hover:bg-gray-700 text-xs font-medium px-4 py-2 rounded-lg transition-colors cursor-pointer">Cancel</button>
                        <button onclick="saveCompiledScript()" class="bg-emerald-600 hover:bg-emerald-500 text-white text-xs font-medium px-5 py-2 rounded-lg transition-colors cursor-pointer shadow-md" id="save-btn">Save & Publish</button>
                    </div>
                    <div class="flex-1 min-h-[400px] bg-gray-900 border border-gray-800 rounded-xl flex overflow-hidden font-mono text-sm relative">
                        <div id="line-gutter" class="w-12 bg-gray-950 border-r border-gray-800 text-right pr-3 py-4 text-gray-600 select-none custom-scrollbar overflow-hidden">1</div>
                        <textarea id="script-body" spellcheck="false" class="flex-1 bg-transparent text-gray-300 p-4 outline-none resize-none custom-scrollbar whitespace-pre leading-normal" oninput="updateLineNumbers()" onscroll="syncGutter()"></textarea>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const API_URL = "https://api.jsonbin.io/v3/b/6a0f135bee5a733b12f7d4ec"; 
        const API_KEY = "$2a$10$L/SsdAAbMpwYkkXDkCaNi.ZWw47F2uIvJqRYt195De.yEeNfZj6Nq";

        let isLoginMode = true;
        let currentUser = null;
        let cachedDB = null;

        async function fetchDatabase(forceRefresh = false) {
            if (cachedDB && !forceRefresh) return cachedDB;
            const res = await fetch(`${API_URL}?meta=false&cb=${new Date().getTime()}`, {
                method: "GET",
                headers: { "X-Access-Key": API_KEY }
            });
            if (!res.ok) throw new Error("Connection failed.");
            let data = await res.json();
            if (!data.Users) data.Users = [];
            if (!data.Scripts) data.Scripts = [];
            cachedDB = data;
            return data;
        }

        async function updateDatabase(payload) {
            const res = await fetch(API_URL, {
                method: "PUT",
                headers: { "Content-Type": "application/json", "X-Access-Key": API_KEY },
                body: JSON.stringify(payload)
            });
            if (!res.ok) throw new Error("Update failed.");
            cachedDB = payload;
        }

        function showToast(m, err = false) {
            const t = document.createElement("div");
            t.className = `fixed bottom-5 right-5 bg-gray-900 border ${err ? 'border-red-500' : 'border-emerald-500'} px-4 py-3 rounded-xl z-50 text-sm`;
            t.textContent = m;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 4000);
        }

        async function handleAuth() {
            const user = document.getElementById("auth-user").value.trim().toLowerCase();
            const pass = document.getElementById("auth-pass").value;
            const db = await fetchDatabase(true);

            if (isLoginMode) {
                if (user === "guest") { currentUser = "guest"; loadDashboard(); }
                else if (db.Users.find(u => u.username === user && u.password === pass)) { currentUser = user; loadDashboard(); }
                else showToast("Fail.", true);
            } else {
                if (db.Users.some(u => u.username === user)) showToast("Exists.", true);
                else { db.Users.push({username: user, password: pass}); await updateDatabase(db); showToast("Success."); toggleAuthMode(); }
            }
        }

        function loadDashboard() {
            document.getElementById("auth-container").classList.add("hidden");
            document.getElementById("dashboard-container").classList.remove("hidden");
            document.getElementById("user-display").textContent = `User: ${currentUser}`;
            switchTab('lua-scripts');
        }

        async function saveCompiledScript() {
            if(currentUser === "guest") return;
            const db = await fetchDatabase(true);
            if (!db.Scripts) db.Scripts = [];
            db.Scripts.push({id: Math.random(), title: document.getElementById("script-title").value, content: document.getElementById("script-body").value, author: currentUser, createdAt: new Date()});
            await updateDatabase(db);
            switchTab('lua-scripts');
        }

        function switchTab(t) {
            document.getElementById("tab-lua-scripts").classList.toggle("hidden", t !== 'lua-scripts');
            document.getElementById("tab-editor").classList.toggle("hidden", t !== 'editor');
            document.getElementById("create-btn").classList.toggle("hidden", currentUser === "guest");
            if(t === 'lua-scripts') renderScripts();
        }

        async function renderScripts() {
            const db = await fetchDatabase(true);
            const grid = document.getElementById("scripts-grid");
            grid.innerHTML = "";
            (currentUser === "guest" ? db.Scripts : db.Scripts.filter(s => s.author === currentUser)).forEach(s => {
                grid.innerHTML += `<div class="bg-gray-900 p-4 rounded-xl border border-gray-800"><h3>${s.title}</h3><p class="text-xs text-gray-500">${s.author}</p></div>`;
            });
        }

        function toggleAuthMode() { isLoginMode = !isLoginMode; document.getElementById("auth-primary-btn").textContent = isLoginMode ? "Log In" : "Sign Up"; }
        function logout() { location.reload(); }
    </script>
</body>
</html>
