<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luanet Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* Custom scrollbar and code editor utilities */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #111827; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen font-sans antialiased selection:bg-blue-500/30">

    <!-- AUTHENTICATION CONTAINER -->
    <div id="auth-container" class="flex min-h-screen items-center justify-center p-4">
        <div class="bg-gray-900 border border-gray-800 p-8 rounded-2xl w-full max-w-md shadow-2xl relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-blue-500 to-indigo-600"></div>
            <h1 class="text-3xl font-extrabold tracking-tight mb-2 bg-gradient-to-r from-blue-400 to-indigo-400 bg-clip-text text-transparent">Luanet</h1>
            <p id="auth-subtitle" class="text-gray-400 text-sm mb-6">Log in to manage your active cloud environment.</p>

            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-gray-400 mb-1">Username</label>
                    <input type="text" id="auth-user" class="w-full bg-gray-950 border border-gray-800 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-blue-500 transition-colors">
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-gray-400 mb-1">Password</label>
                    <input type="password" id="auth-pass" class="w-full bg-gray-950 border border-gray-800 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-blue-500 transition-colors">
                </div>
                <button id="auth-primary-btn" onclick="handleAuth()" class="w-full bg-blue-600 hover:bg-blue-500 font-medium text-sm py-2.5 rounded-lg transition-colors cursor-pointer mt-2 shadow-lg shadow-blue-600/20">Log In</button>
                
                <div class="text-center mt-4">
                    <button id="auth-toggle" onclick="toggleAuthMode()" class="text-xs text-gray-400 hover:text-blue-400 transition-colors cursor-pointer">Don't have an account? Sign Up</button>
                </div>
            </div>
        </div>
    </div>

    <!-- MAIN DASHBOARD SYSTEM -->
    <div id="dashboard-container" class="hidden flex min-h-screen">
        <!-- Sidebar Navigation -->
        <aside class="w-64 bg-gray-900 border-r border-gray-800 flex flex-col shrink-0">
            <div class="p-6 border-b border-gray-800">
                <div class="flex items-center space-x-2">
                    <div class="w-3 h-3 rounded-full bg-emerald-500 animate-pulse"></div>
                    <span class="font-bold tracking-wide text-lg text-white">Luanet Core</span>
                </div>
                <p id="user-display" class="text-xs text-gray-400 mt-1 truncate"></p>
            </div>
            <nav class="flex-1 p-4 space-y-1">
                <button onclick="switchTab('lua-scripts')" class="w-full flex items-center space-x-3 bg-gray-800 text-white px-4 py-2.5 rounded-lg text-sm font-medium transition-colors cursor-pointer group">
                    <span class="text-blue-400 font-mono group-hover:scale-110 transition-transform">&lt;/&gt;</span>
                    <span>Lua Scripts</span>
                </button>
            </nav>
            <div class="p-4 border-t border-gray-800">
                <button onclick="logout()" class="w-full bg-gray-800 hover:bg-red-900/40 hover:text-red-300 text-gray-400 px-4 py-2 rounded-lg text-xs font-medium transition-colors cursor-pointer">Sign Out</button>
            </div>
        </aside>

        <!-- Dynamic Content Engine -->
        <main class="flex-1 bg-gray-950 flex flex-col h-screen overflow-hidden">
            <!-- Top Navbar Bar -->
            <header class="h-16 border-b border-gray-800 flex items-center justify-between px-8 bg-gray-900/40 backdrop-blur-md shrink-0">
                <h2 id="view-title" class="text-lg font-semibold text-white">Lua Scripts Dashboard</h2>
                <div id="view-actions">
                    <button onclick="openScriptEditor()" class="bg-blue-600 hover:bg-blue-500 text-white text-xs font-medium px-4 py-2 rounded-lg transition-colors cursor-pointer shadow-md">Create Lua Script</button>
                </div>
            </header>

            <!-- Inner View Content Manager -->
            <div class="flex-1 p-8 overflow-y-auto custom-scrollbar">
                
                <!-- Tab: Script Inventory View -->
                <div id="tab-lua-scripts" class="block">
                    <div id="scripts-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                        <!-- Instanced Scripts Inject Here Dynamically -->
                    </div>
                    <div id="empty-state" class="hidden text-center py-12 border border-dashed border-gray-800 rounded-xl">
                        <p class="text-gray-500 text-sm">No scripts compiled yet. Click 'Create Lua Script' to begin deployment.</p>
                    </div>
                </div>

                <!-- Tab: Immersive Interactive Editor -->
                <div id="tab-editor" class="hidden h-full flex flex-col space-y-4">
                    <div class="flex gap-4">
                        <input type="text" id="script-title" placeholder="Script Name (e.g., Anti-Cheat System)" class="flex-1 bg-gray-900 border border-gray-800 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-blue-500 transition-colors">
                        <button onclick="switchTab('lua-scripts')" class="bg-gray-800 hover:bg-gray-700 text-xs font-medium px-4 py-2 rounded-lg transition-colors cursor-pointer">Cancel</button>
                        <button onclick="saveCompiledScript()" class="bg-emerald-600 hover:bg-emerald-500 text-white text-xs font-medium px-5 py-2 rounded-lg transition-colors cursor-pointer shadow-md">Save & Publish</button>
                    </div>
                    
                    <!-- Advanced Plain Codebox Component container -->
                    <div class="flex-1 min-h-[400px] bg-gray-900 border border-gray-800 rounded-xl flex overflow-hidden font-mono text-sm relative">
                        <!-- Line Counter Strip -->
                        <div id="line-gutter" class="w-12 bg-gray-950/60 text-right pr-3 pt-4 text-gray-600 select-none border-r border-gray-800/40 overflow-hidden leading-6">1</div>
                        <!-- Source Input Field -->
                        <textarea id="script-body" oninput="syncEditorMetrics()" onscroll="syncEditorScrolling()" placeholder="-- Enter your clean Luau execution sequence here..." class="flex-1 p-4 bg-transparent outline-none resize-none overflow-y-auto custom-scrollbar leading-6 text-blue-300 z-10" spellcheck="false"></textarea>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <!-- NOTIFICATION CONTROLLER -->
    <div id="toast" class="fixed bottom-5 right-5 bg-gray-900 border border-gray-800 px-4 py-3 rounded-xl shadow-2xl z-50 transform translate-y-20 opacity-0 transition-all duration-300 text-sm flex items-center space-x-2"></div>

    <!-- CORE INTEGRATION LOGIC -->
    <script>
        const BIN_ID = "6a0f135bee5a733b12f7d4ec";
        const API_KEY = "$2a$10$L/SsdAAbMpwYkkXDkCaNi.ZWw47F2uIvJqRYt195De.yEeNfZj6Nq";
        const API_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

        let isSignUpMode = false;
        let currentUser = localStorage.getItem("luanet_user") || null;

        // Life-cycle Bootloader
        window.addEventListener("DOMContentLoaded", () => {
            if (currentUser) {
                initDashboard();
            }
        });

        function showToast(msg, isError = false) {
            const toast = document.getElementById("toast");
            toast.textContent = msg;
            toast.className = `fixed bottom-5 right-5 bg-gray-900 border ${isError ? 'border-red-500/40 text-red-400' : 'border-emerald-500/40 text-emerald-400'} px-4 py-3 rounded-xl shadow-2xl z-50 transform translate-y-0 opacity-100 transition-all duration-300 text-sm`;
            setTimeout(() => {
                toast.className = "fixed bottom-5 right-5 bg-gray-900 border border-gray-800 px-4 py-3 rounded-xl shadow-2xl z-50 transform translate-y-20 opacity-0 transition-all duration-300 text-sm";
            }, 4000);
        }

        function toggleAuthMode() {
            isSignUpMode = !isSignUpMode;
            document.getElementById("auth-subtitle").textContent = isSignUpMode ? "Create an absolute credential block inside the network." : "Log in to manage your active cloud environment.";
            document.getElementById("auth-primary-btn").textContent = isSignUpMode ? "Sign Up" : "Log In";
            document.getElementById("auth-toggle").textContent = isSignUpMode ? "Already have an account? Log In" : "Don't have an account? Sign Up";
        }

        async function fetchDatabase() {
            const res = await fetch(API_URL, {
                headers: { "X-Master-Key": API_KEY, "X-Bin-Meta": "false" }
            });
            return await res.json();
        }

        async function updateDatabase(payload) {
            await fetch(API_URL, {
                method: "PUT",
                headers: {
                    "Content-Type": "application/json",
                    "X-Master-Key": API_KEY
                },
                body: JSON.stringify(payload)
            });
        }

        async function handleAuth() {
            const userInp = document.getElementById("auth-user").value.trim();
            const passInp = document.getElementById("auth-pass").value.trim();

            if (!userInp || !passInp) return showToast("All identity fields must be validated.", true);

            try {
                document.getElementById("auth-primary-btn").disabled = true;
                document.getElementById("auth-primary-btn").textContent = "Processing Stream...";
                
                const db = await fetchDatabase();
                if (!db.Users) db.Users = [];
                if (!db.Scripts) db.Scripts = [];

                if (isSignUpMode) {
                    const trackingCheck = db.Users.find(u => u.username.toLowerCase() === userInp.toLowerCase());
                    if (trackingCheck) {
                        document.getElementById("auth-primary-btn").disabled = false;
                        document.getElementById("auth-primary-btn").textContent = "Sign Up";
                        return showToast("Entity registration rejected: Username already exists.", true);
                    }
                    db.Users.push({ username: userInp, password: passInp });
                    await updateDatabase(db);
                    showToast("Account signed up successfully! Logging in...");
                } else {
                    const verified = db.Users.find(u => u.username.toLowerCase() === userInp.toLowerCase() && u.password === passInp);
                    if (!verified) {
                        document.getElementById("auth-primary-btn").disabled = false;
                        document.getElementById("auth-primary-btn").textContent = "Log In";
                        return showToast("Invalid structural credentials provided.", true);
                    }
                }

                localStorage.setItem("luanet_user", userInp);
                currentUser = userInp;
                initDashboard();
            } catch (err) {
                showToast("Runtime transmission fault connecting to remote cloud.", true);
                console.error(err);
            } finally {
                document.getElementById("auth-primary-btn").disabled = false;
            }
        }

        function initDashboard() {
            document.getElementById("auth-container").classList.add("hidden");
            document.getElementById("dashboard-container").classList.remove("hidden");
            document.getElementById("user-display").textContent = `@${currentUser}`;
            switchTab('lua-scripts');
        }

        function logout() {
            localStorage.clear();
            location.reload();
        }

        function switchTab(target) {
            if (target === 'lua-scripts') {
                document.getElementById("view-title").textContent = "Lua Scripts Dashboard";
                document.getElementById("view-actions").classList.remove("hidden");
                document.getElementById("tab-lua-scripts").classList.remove("hidden");
                document.getElementById("tab-editor").classList.add("hidden");
                renderUserScripts();
            } else if (target === 'editor') {
                document.getElementById("view-title").textContent = "Dynamic Code Compiler";
                document.getElementById("view-actions").classList.add("hidden");
                document.getElementById("tab-lua-scripts").classList.add("hidden");
                document.getElementById("tab-editor").classList.remove("hidden");
            }
        }

        function openScriptEditor() {
            document.getElementById("script-title").value = "";
            document.getElementById("script-body").value = "";
            syncEditorMetrics();
            switchTab('editor');
        }

        function syncEditorMetrics() {
            const body = document.getElementById("script-body");
            const gutter = document.getElementById("line-gutter");
            const count = body.value.split("\n").length;
            let lineHTML = "";
            for (let i = 1; i <= count; i++) {
                lineHTML += `${i}<br>`;
            }
            gutter.innerHTML = lineHTML;
        }

        function syncEditorScrolling() {
            const body = document.getElementById("script-body");
            const gutter = document.getElementById("line-gutter");
            gutter.scrollTop = body.scrollTop;
        }

        async function saveCompiledScript() {
            const title = document.getElementById("script-title").value.trim();
            const content = document.getElementById("script-body").value;

            if (!title) return showToast("Every script payload must possess a structural title.", true);

            try {
                showToast("Publishing script to global runtime...");
                const db = await fetchDatabase();
                if (!db.Scripts) db.Scripts = [];

                // Generate a cryptographically clean random identifier asset string matching user parameters
                const randomId = Array.from({length: 32}, () => Math.floor(Math.random()*16).toString(16)).join('') + "y5thgyebygdf7yg6ydgdf";
                
                db.Scripts.push({
                    id: randomId,
                    title: title,
                    content: content,
                    author: currentUser,
                    createdAt: new Date().toISOString()
                });

                await updateDatabase(db);
                showToast("Script pushed successfully.");
                switchTab('lua-scripts');
            } catch (err) {
                showToast("System failed to save payload to database layer.", true);
            }
        }

        async function renderUserScripts() {
            const grid = document.getElementById("scripts-grid");
            const empty = document.getElementById("empty-state");
            grid.innerHTML = "";

            try {
                const db = await fetchDatabase();
                const userScripts = (db.Scripts || []).filter(s => s.author === currentUser);

                if (userScripts.length === 0) {
                    empty.classList.remove("hidden");
                    return;
                }
                empty.classList.add("hidden");

                userScripts.forEach(scr => {
                    const card = document.createElement("div");
                    card.className = "bg-gray-900 border border-gray-800 p-5 rounded-xl flex flex-col justify-between hover:border-gray-700 transition-colors";
                    
                    // Determine the clean visual path structure
                    const targetPath = `${window.location.origin}${window.location.pathname.replace('index.html','')}api/?id=${scr.id}`;
                    
                    card.innerHTML = `
                        <div>
                            <h3 class="font-bold text-white text-base truncate">${scr.title}</h3>
                            <p class="text-xs text-gray-500 mt-1">ID: ${scr.id.substring(0,12)}...</p>
                        </div>
                        <div class="mt-6 pt-3 border-t border-gray-800/60 flex items-center justify-between">
                            <a href="${targetPath}" target="_blank" class="text-xs text-blue-400 hover:underline">Launch API endpoint →</a>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            } catch(e) {
                showToast("Critical operational failure pulling assets.", true);
            }
        }
    </script>
</body>
</html>
