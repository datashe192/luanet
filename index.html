<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luanet Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #111827; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen font-sans antialiased selection:bg-blue-500/30">

    <div id="auth-container" class="flex min-h-screen items-center justify-center p-4">
        <div class="bg-gray-900 border border-gray-800 p-8 rounded-2xl w-full max-w-md shadow-2xl relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-blue-500 to-indigo-600"></div>
            <h1 class="text-3xl font-extrabold tracking-tight mb-2 bg-gradient-to-r from-blue-400 to-indigo-400 bg-clip-text text-transparent">Luanet</h1>
            <p id="auth-subtitle" class="text-gray-400 text-sm mb-6">Log in to manage your active cloud environment.</p>

            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-gray-400 mb-1">Username</label>
                    <input type="text" id="auth-user" class="w-full bg-gray-950 border border-gray-800 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-blue-500 transition-colors">
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-gray-400 mb-1">Password</label>
                    <input type="password" id="auth-pass" class="w-full bg-gray-950 border border-gray-800 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-blue-500 transition-colors">
                </div>
                <button id="auth-primary-btn" onclick="handleAuth()" class="w-full bg-blue-600 hover:bg-blue-500 font-medium text-sm py-2.5 rounded-lg transition-colors cursor-pointer mt-2 shadow-lg shadow-blue-600/20">Log In</button>
                
                <div class="text-center mt-4">
                    <button id="auth-toggle" onclick="toggleAuthMode()" class="text-xs text-gray-400 hover:text-blue-400 transition-colors cursor-pointer">Don't have an account? Sign Up</button>
                </div>
            </div>
        </div>
    </div>

    <div id="dashboard-container" class="hidden flex min-h-screen">
        <aside class="w-64 bg-gray-900 border-r border-gray-800 flex flex-col shrink-0">
            <div class="p-6 border-b border-gray-800">
                <div class="flex items-center space-x-2">
                    <div class="w-3 h-3 rounded-full bg-emerald-500 animate-pulse"></div>
                    <span class="font-bold tracking-wide text-lg text-white">Luanet Core</span>
                </div>
                <p id="user-display" class="text-xs text-gray-400 mt-1 truncate"></p>
            </div>
            <nav class="flex-1 p-4 space-y-1">
                <button onclick="switchTab('lua-scripts')" class="w-full flex items-center space-x-3 bg-gray-800 text-white px-4 py-2.5 rounded-lg text-sm font-medium transition-colors cursor-pointer group">
                    <span class="text-blue-400 font-mono group-hover:scale-110 transition-transform">&lt;/&gt;</span>
                    <span>Lua Scripts</span>
                </button>
            </nav>
            <div class="p-4 border-t border-gray-800">
                <button onclick="logout()" class="w-full bg-gray-800 hover:bg-red-900/40 hover:text-red-300 text-gray-400 px-4 py-2 rounded-lg text-xs font-medium transition-colors cursor-pointer">Sign Out</button>
            </div>
        </aside>

        <main class="flex-1 bg-gray-950 flex flex-col h-screen overflow-hidden">
            <header class="h-16 border-b border-gray-800 flex items-center justify-between px-8 bg-gray-900/40 backdrop-blur-md shrink-0">
                <h2 id="view-title" class="text-lg font-semibold text-white">Lua Scripts Dashboard</h2>
                <div id="view-actions">
                    <button onclick="openScriptEditor()" class="bg-blue-600 hover:bg-blue-500 text-white text-xs font-medium px-4 py-2 rounded-lg transition-colors cursor-pointer shadow-md">Create Lua Script</button>
                </div>
            </header>

            <div class="flex-1 p-8 overflow-y-auto custom-scrollbar">
                <div id="tab-lua-scripts" class="block">
                    <div id="scripts-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
                    <div id="empty-state" class="hidden text-center py-12 border border-dashed border-gray-800 rounded-xl">
                        <p class="text-gray-500 text-sm">No scripts compiled yet. Click 'Create Lua Script' to begin deployment.</p>
                    </div>
                </div>

                <div id="tab-editor" class="hidden h-full flex flex-col space-y-4">
                    <div class="flex gap-4">
                        <input type="text" id="script-title" placeholder="Script Name (e.g., Anti-Cheat System)" class="flex-1 bg-gray-900 border border-gray-800 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-blue-500 transition-colors">
                        <button onclick="switchTab('lua-scripts')" class="bg-gray-800 hover:bg-gray-700 text-xs font-medium px-4 py-2 rounded-lg transition-colors cursor-pointer">Cancel</button>
                        <button onclick="saveCompiledScript()" class="bg-emerald-600 hover:bg-emerald-500 text-white text-xs font-medium px-5 py-2 rounded-lg transition-colors cursor-pointer shadow-md" id="save-btn">Save & Publish</button>
                    </div>
                    
                    <div class="flex-1 min-h-[400px] bg-gray-900 border border-gray-800 rounded-xl flex overflow-hidden font-mono text-sm relative">
                        <div id="line-gutter" class="w-12 bg-gray-950 border-r border-gray-800 text-right pr-3 py-4 text-gray-600 select-none custom-scrollbar overflow-hidden">
                            1
                        </div>
                        <textarea id="script-body" spellcheck="false" class="flex-1 bg-transparent text-gray-300 p-4 outline-none resize-none custom-scrollbar whitespace-pre leading-normal" oninput="updateLineNumbers()" onscroll="syncGutter()"></textarea>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const API_URL = "https://api.jsonbin.io/v3/b/6a0f135bee5a733b12f7d4ec"; 
        
        // YOUR NEW ACCESS KEY INJECTED HERE
        const API_KEY = "$2a$10$ZIn.UyUVBI2mtaIHI8wvXO/l67hIde7k0kPRsz15kpWomcbRCIOYS"; 

        let isLoginMode = true;
        let currentUser = null;
        let cachedDB = null;

        // DIAGNOSTIC FETCH
        async function fetchDatabase(forceRefresh = false) {
            if (cachedDB && !forceRefresh) return cachedDB;
            const cb = new Date().getTime(); 
            
            try {
                const res = await fetch(`${API_URL}?cb=${cb}`, {
                    method: "GET",
                    headers: { 
                        "X-Access-Key": API_KEY, // Changed to X-Access-Key
                        "X-Bin-Meta": "false",
                        "Content-Type": "application/json"
                    }
                });
                
                if (!res.ok) {
                    const errText = await res.text();
                    throw new Error(`JSONBin GET Error ${res.status}: ${errText}`);
                }

                let rawData = await res.json();
                
                let data = rawData.record ? rawData.record : rawData;
                
                if (!data) data = {};
                if (!data.Users) data.Users = [];
                if (!data.Scripts) data.Scripts = [];
                cachedDB = data;
                return data;

            } catch (err) {
                throw new Error(`Fetch Error: ${err.message}`);
            }
        }

        // DIAGNOSTIC UPDATE
        async function updateDatabase(payload) {
            try {
                const res = await fetch(API_URL, {
                    method: "PUT",
                    headers: {
                        "Content-Type": "application/json",
                        "X-Access-Key": API_KEY, // Changed to X-Access-Key
                        "X-Bin-Versioning": "false"
                    },
                    body: JSON.stringify(payload)
                });
                
                if (!res.ok) {
                    const errText = await res.text();
                    throw new Error(`JSONBin PUT Error ${res.status}: ${errText}`);
                }
                cachedDB = payload; 
            } catch (err) {
                throw new Error(`Update Error: ${err.message}`);
            }
        }

        function setAuthMode(mode) {
            isLoginMode = mode;
            document.getElementById("auth-primary-btn").textContent = isLoginMode ? "Log In" : "Sign Up";
            document.getElementById("auth-subtitle").textContent = isLoginMode ? "Log in to manage your active cloud environment." : "Create a secure account to access Luanet.";
            document.getElementById("auth-toggle").textContent = isLoginMode ? "Don't have an account? Sign Up" : "Already have an account? Log In";
        }

        function toggleAuthMode() {
            setAuthMode(!isLoginMode);
        }

        function showToast(message, isError = false) {
            const existing = document.getElementById("toast");
            if(existing) existing.remove();

            const toast = document.createElement("div");
            toast.id = "toast";
            toast.className = `fixed bottom-5 right-5 bg-gray-900 border ${isError ? 'border-red-500/40 text-red-400' : 'border-emerald-500/40 text-emerald-400'} px-4 py-3 rounded-xl shadow-2xl z-50 transform translate-y-0 opacity-100 transition-all duration-300 text-sm max-w-md break-words`;
            toast.textContent = message;
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.classList.add("translate-y-10", "opacity-0");
                setTimeout(() => toast.remove(), 300);
            }, 7000); 
        }

        async function handleAuth() {
            const user = document.getElementById("auth-user").value.trim();
            const pass = document.getElementById("auth-pass").value;
            const btn = document.getElementById("auth-primary-btn");

            if (!user || !pass) return showToast("Credentials required.", true);

            try {
                btn.disabled = true;
                btn.textContent = "Authenticating...";
                
                const db = await fetchDatabase(true); 

                if (isLoginMode) {
                    const validUser = db.Users.find(u => u.username === user && u.password === pass);
                    if (validUser) {
                        currentUser = user;
                        showToast("Authentication successful.");
                        loadDashboard();
                    } else {
                        showToast("Invalid credentials.", true);
                    }
                } else {
                    if (db.Users.some(u => u.username === user)) {
                        showToast("Identifier already in use.", true);
                    } else {
                        db.Users.push({ username: user, password: pass });
                        await updateDatabase(db);
                        
                        setAuthMode(true);
                        
                        showToast("Account signed up successfully. Proceed to login.");
                    }
                }
            } catch (err) {
                showToast(`Crash: ${err.message}`, true);
                console.error("FULL CRASH LOG:", err);
            } finally {
                btn.disabled = false;
                btn.textContent = isLoginMode ? "Log In" : "Sign Up";
            }
        }

        function loadDashboard() {
            document.getElementById("auth-container").classList.add("hidden");
            document.getElementById("dashboard-container").classList.remove("hidden");
            document.getElementById("user-display").textContent = `Auth: ${currentUser}`;
            switchTab('lua-scripts');
        }

        function switchTab(tabId) {
            document.getElementById("tab-lua-scripts").classList.add("hidden");
            document.getElementById("tab-editor").classList.add("hidden");
            document.getElementById("view-actions").classList.add("hidden");

            if (tabId === 'lua-scripts') {
                document.getElementById("tab-lua-scripts").classList.remove("hidden");
                document.getElementById("view-title").textContent = "Lua Scripts Dashboard";
                document.getElementById("view-actions").classList.remove("hidden");
                renderScripts();
            } else if (tabId === 'editor') {
                document.getElementById("tab-editor").classList.remove("hidden");
                document.getElementById("view-title").textContent = "Script Configuration";
            }
        }

        function openScriptEditor() {
            document.getElementById("script-title").value = "";
            document.getElementById("script-body").value = "";
            updateLineNumbers();
            switchTab('editor');
        }

        function updateLineNumbers() {
            const ta = document.getElementById("script-body");
            const gutter = document.getElementById("line-gutter");
            const lines = ta.value.split('\n').length;
            gutter.innerHTML = Array.from({length: lines || 1}, (_, i) => i + 1).join('<br>');
        }

        function syncGutter() {
            document.getElementById("line-gutter").scrollTop = document.getElementById("script-body").scrollTop;
        }

        async function saveCompiledScript() {
            const title = document.getElementById("script-title").value.trim();
            const content = document.getElementById("script-body").value;
            const btn = document.getElementById("save-btn");

            if (!title) return showToast("Every script payload must possess a structural title.", true);

            try {
                btn.disabled = true;
                btn.textContent = "Publishing...";
                
                const db = await fetchDatabase(true);
                const randomId = Array.from({length: 32}, () => Math.floor(Math.random()*16).toString(16)).join('');
                
                db.Scripts.push({
                    id: randomId,
                    title: title,
                    content: content,
                    author: currentUser,
                    createdAt: new Date().toISOString()
                });

                await updateDatabase(db);

                showToast("Script pushed successfully.");
                switchTab('lua-scripts');
            } catch (err) {
                showToast(`Publish Blocked: ${err.message}`, true);
                console.error(err);
            } finally {
                btn.disabled = false;
                btn.textContent = "Save & Publish";
            }
        }

        async function deleteScript(id) {
            if(!confirm("Are you sure you want to completely drop this script from the database?")) return;
            
            try {
                const db = await fetchDatabase(true);
                db.Scripts = db.Scripts.filter(s => s.id !== id);
                await updateDatabase(db);
                showToast("Payload wiped.");
                renderScripts();
            } catch(err) {
                showToast(`Delete Failed: ${err.message}`, true);
            }
        }

        async function renderScripts() {
            const grid = document.getElementById("scripts-grid");
            const empty = document.getElementById("empty-state");
            grid.innerHTML = "";

            try {
                const db = await fetchDatabase(true);
                const myScripts = db.Scripts.filter(s => s.author === currentUser);

                if (myScripts.length === 0) {
                    empty.classList.remove("hidden");
                } else {
                    empty.classList.add("hidden");
                    myScripts.forEach(script => {
                        const date = new Date(script.createdAt).toLocaleDateString();
                        const card = document.createElement("div");
                        card.className = "bg-gray-900 border border-gray-800 rounded-xl p-5 hover:border-gray-700 transition-colors flex flex-col h-40 group";
                        card.innerHTML = `
                            <div class="flex justify-between items-start mb-2">
                                <h3 class="font-semibold text-gray-200 truncate pr-2">${script.title}</h3>
                                <button onclick="deleteScript('${script.id}')" class="text-gray-600 hover:text-red-400 opacity-0 group-hover:opacity-100 transition-all cursor-pointer">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                                </button>
                            </div>
                            <p class="text-xs text-gray-500 mb-4">Deployed: ${date}</p>
                            <div class="mt-auto">
                                <div class="bg-gray-950 rounded p-2 text-xs font-mono text-gray-400 truncate border border-gray-800">
                                    ${script.content ? script.content.substring(0, 30) + '...' : '-- empty --'}
                                </div>
                            </div>
                        `;
                        grid.appendChild(card);
                    });
                }
            } catch (err) {
                showToast(`Render Error: ${err.message}`, true);
            }
        }

        function logout() {
            currentUser = null;
            cachedDB = null;
            document.getElementById("auth-user").value = "";
            document.getElementById("auth-pass").value = "";
            document.getElementById("dashboard-container").classList.add("hidden");
            document.getElementById("auth-container").classList.remove("hidden");
            setAuthMode(true);
        }
    </script>
</body>
</html>
